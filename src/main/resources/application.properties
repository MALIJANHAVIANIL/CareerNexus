spring.application.name=careernexus

server.port=8081

spring.datasource.url=jdbc:postgresql://localhost:5432/careernexus
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:12345}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.open-in-view=false

careernexus.jwt.secret=${JWT_SECRET:****************************************************************}
careernexus.jwt.expiration=86400000